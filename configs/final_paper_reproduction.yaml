schema_version: 1
description: "Reproduction metadata for the final paper Flag Game charts."
source_bundle: "paper/final_charts"

model_ids:
  openai:
    - "gpt-4o"
    - "gpt-5.4"
  anthropic:
    - "claude-haiku-4-5-20251001"
    - "claude-sonnet-4-6"
    - "claude-opus-4-1"
    - "claude-opus-4-6"

api_settings:
  openai_chat_completions:
    shared_source: "nnd/flag_game/backend.py"
    protocol_wrappers:
      pairwise: "nnd/flag_game/backend.py"
      broadcast: "nnd/flag_game_broadcast/backend.py"
      manager_protocol: "nnd/flag_game_org/backend.py"
    client_call: "client.chat.completions.create"
    arguments: ["model", "messages", "temperature", "top_p", "max_completion_tokens"]
    image_detail_default_for_final_runs: "high"
  anthropic_messages:
    source: "nnd/flag_game/backend.py"
    client_call: "client.messages.create"
    arguments: ["model", "system", "messages", "max_tokens", "temperature"]
    top_p_note: "top_p is omitted by the backend when top_p == 1.0."
  common_flag_game_defaults:
    temperature: 0.2
    top_p: 1.0
    prompt_style: "closed_country_list"
    prompt_social_susceptibility_for_neutral_alpha_runs: false
    social_susceptibility_for_neutral_alpha_runs: 0.5
    image_detail: "high"
    canvas_width: 24
    canvas_height: 16
    tile_width: 6
    tile_height: 4
    render_scale: 25

prompt_templates:
  exact_prompt_template_snapshot: "configs/final_paper_prompt_templates.md"
  pairwise_closed_country_list:
    source: "nnd/flag_game/prompts.py"
    functions:
      system: "system_prompt"
      user_interaction: "interaction_text"
      user_probe: "probe_text"
      retry_interaction: "interaction_retry_text"
      retry_probe: "probe_retry_text"
  broadcast:
    source: "nnd/flag_game_broadcast/prompts.py"
    functions:
      system: "system_prompt"
      user_statement: "statement_text"
      user_decision: "decision_text"
      retry_statement: "statement_retry_text"
      retry_decision: "decision_retry_text"
  manager_protocol:
    source: "nnd/flag_game_org/prompts.py"
    functions:
      observer_system: "observer_system_prompt"
      manager_system: "manager_system_prompt"
      observer_user: "observer_statement_text"
      manager_user: "aggregator_decision_text"
      observer_retry: "observer_statement_retry_text"
      manager_retry: "aggregator_decision_retry_text"

figure_reproduction:
  working_directory: "paper/final_charts"
  all_final_figures: "./scripts/rebuild_final_charts.sh"
  individual_commands:
    protocol_side_by_side: "python3 paper/make_flag_protocol_side_by_side_visuals.py --source-ranked-csv paper/exports/data/flag_gam_protocol_side_by_side_N8_final_ranked_performance.csv --out-stem flag_gam_protocol_side_by_side_N8_final --final-only --x-max 0.8"
    slot_figures: "python3 paper/make_flag_game_slot_figures.py"
    broadcast: "python3 paper/make_flag_broadcast_visuals.py"
    visual_only_audit: "python3 paper/make_flag_visual_only_audit_visuals.py --source results/flag_game/visual_only_paired_crop_audit/results.csv --figure-dir paper/exports/figures --data-dir paper/exports/data --stem flag_game_visual_only_paired_audit"
    pairwise_alpha: "FINAL_CHARTS_DERIVED_ONLY=1 python3 paper/make_flag_game_alpha_visuals.py"
    pairwise_n_scaling: "FINAL_CHARTS_DERIVED_ONLY=1 python3 paper/make_flag_game_n_scaling_visuals.py"
    memory_conflict_all_models: "python3 paper/make_flag_memory_conflict_probe_visuals.py --source-csv results/flag_game/memory_conflict_probe_pilot/results.csv --source-csv results/flag_game/memory_conflict_probe_claude/results.csv --source-csv results/flag_game/memory_conflict_probe_opus/results.csv --source-csv results/flag_game/memory_conflict_probe_opus46/results.csv --stem-prefix flag_game_memory_conflict_probe_all_models --alignment-only"
    memory_conflict_m1_no_opus: "python3 paper/make_flag_memory_conflict_probe_visuals.py --source-csv results/flag_game/memory_conflict_probe_pilot/results.csv --source-csv results/flag_game/memory_conflict_probe_claude/results.csv --stem-prefix flag_game_memory_conflict_probe_all_models_m1_contradicts_no_opus --m 1 --facet weak-incompatible --alignment-only --hide-section-titles"
    measured_field: "./scripts/make_flag_mechanism1_measured_field_final.sh"

experiments:
  memory_conflict_probe:
    figures:
      - "flag_game_memory_conflict_probe_all_models_alignment"
      - "flag_game_memory_conflict_probe_all_models_alignment_m1_contradicts_no_opus"
    source_script: "scripts/run_flag_memory_conflict_probe.py"
    plotting_script: "paper/make_flag_memory_conflict_probe_visuals.py"
    api:
      temperature: 0.2
      top_p: 1.0
      max_tokens: 200
      image_detail: "high"
      prompt_social_susceptibility: false
    design:
      country_pool: "stripe_plus_real_triangle_28"
      truth_countries: ["Bahamas", "Czech Republic", "Guinea", "Peru"]
      m_values: [1, 3]
      crop_conditions: ["ambiguous_true", "diagnostic_true"]
      lure_relations: ["compatible", "incompatible"]
      false_memory_counts: [0, 1, 2, 3, 4, 5, 6, 7, 8]
      H: 8
      replicates: 3
      base_seed: 0
      exact_per_trial_seed_columns:
        - "paper/final_charts/results/flag_game/memory_conflict_probe_pilot/trial_plan.csv"
        - "paper/final_charts/results/flag_game/memory_conflict_probe_claude/trial_plan.csv"
        - "paper/final_charts/results/flag_game/memory_conflict_probe_opus/trial_plan.csv"
        - "paper/final_charts/results/flag_game/memory_conflict_probe_opus46/trial_plan.csv"
    trial_counts:
      openai_gpt4o_and_gpt54: 1296
      anthropic_haiku45_and_sonnet46: 1296
      anthropic_opus41: 648
      anthropic_opus46: 648
      total_rows: 3888

  protocol_side_by_side_n8:
    figures:
      - "flag_gam_protocol_side_by_side_N8_final"
      - "flag_game_slot_protocol_side_by_side_N8_mixed_ciq"
    source_script: "scripts/run_flag_org_broadcast_side_by_side.py"
    plotting_scripts:
      - "paper/make_flag_protocol_side_by_side_visuals.py"
      - "paper/make_flag_game_slot_figures.py"
    api:
      pairwise_max_tokens: 200
      broadcast_max_tokens: 250
      manager_protocol_max_tokens: 250
      temperature: 0.2
      top_p: 1.0
      image_detail: "high"
      prompt_social_susceptibility: false
      social_susceptibility: 0.5
    design:
      comparison_model: "gpt-4o"
      prestige_model: "gpt-5.4"
      N: 8
      rounds: 10
      pairwise_T: 80
      pairwise_probe_every: 8
      H: 8
      interaction_m: 3
      country_pool: "stripe_plus_real_triangle_28"
      final_plotted_rows: 12
      final_trials_per_row: 63
      final_trial_rows_total: 756
      seed_folders_present: "seed_0000..seed_0019, seed_0021..seed_0060, seed_0062..seed_0064"
      final_bundle_source_table: "paper/final_charts/paper/exports/data/flag_gam_protocol_side_by_side_N8_final_ranked_performance.csv"
      original_source_seed_root: "results/flag_game_side_by_side/protocol_side_by_side_N8_m3_full_10seed/full"

  broadcast_m3_alpha_and_diversity:
    figures:
      - "flag_game_broadcast_m3_diversity_main_with_empirical_metrics"
      - "flag_game_slot_broadcast_m3_diversity_mean_ciq"
      - "flag_game_slot_broadcast_m3_alpha_mean_ciq"
    source_scripts:
      - "scripts/run_flag_broadcast_alpha_mix_count_sweep.sh"
      - "scripts/run_flag_broadcast_alpha_mix_append_seeds6_10.sh"
      - "scripts/run_flag_broadcast_m3_diversity_append_seeds11_20.sh"
    plotting_scripts:
      - "paper/make_flag_broadcast_visuals.py"
      - "paper/make_flag_game_slot_figures.py"
    api:
      temperature: 0.2
      top_p: 1.0
      max_tokens: 250
      image_detail: "high"
      prompt_social_susceptibility: true
      social_susceptibility: "swept alpha"
    design:
      N: 8
      rounds: 10
      H: 8
      interaction_m: 3
      country_pool: "stripe_plus_real_triangle_28"
      comparison_model: "gpt-4o"
      prestige_model: "gpt-5.4"
      gpt54_counts: [0, 1, 2, 3, 4, 5, 6, 7, 8]
      alphas: [0.0, 0.25, 0.5, 0.75, 1.0]
      summary_cells: 45
      total_trials_in_summary: 675
      summary_source: "paper/final_charts/poster/exports/support_visuals/flag_broadcast_alpha_mix_N8_m3_summary.csv"
      slot_compact_summary: "paper/final_charts/paper/exports/data/flag_game_slot_broadcast_compact_summary.json"

  visual_only_paired_audit:
    figure: "flag_game_visual_only_paired_audit_main_half_height"
    source_script: "scripts/run_flag_visual_only_paired_crop_audit.py"
    plotting_script: "paper/make_flag_visual_only_audit_visuals.py"
    api:
      temperature: 0.0
      top_p: 1.0
      max_tokens: 220
      image_detail: "high"
      prompt_social_susceptibility: false
    design:
      models: ["gpt-4o", "gpt-5.4"]
      country_pool: "stripe_plus_real_triangle_28"
      truth_countries: ["Bahamas", "Czech Republic", "Guinea", "Peru"]
      m: 3
      seed: 0
      rows: 200
      unique_crop_pairs: 100
      exact_per_pair_seeds: "paper/final_charts/results/flag_game/visual_only_paired_crop_audit/results.csv:seed"

  pairwise_n_scaling:
    figures:
      - "flag_game_pairwise_n_scaling_france_peru_mechanism_N4_N16_N64_with_empirical_ab_failure_decomposition"
      - "flag_game_slot_pairwise_n_scaling_mean_ciq"
    source_scripts:
      - "scripts/run_flag_model_mix_alpha_neutral.sh"
      - "scripts/run_flag_model_mix_alpha_neutral_N64.sh"
      - "scripts/run_flag_model_mix_alpha_neutral_N128.sh"
    plotting_scripts:
      - "paper/make_flag_game_n_scaling_visuals.py"
      - "paper/make_flag_game_empirical_decomposition.py"
      - "paper/make_flag_game_slot_figures.py"
    api:
      temperature: 0.2
      top_p: 1.0
      max_tokens: 200
      image_detail: "high"
      prompt_social_susceptibility: false
      social_susceptibility: 0.5
    design:
      country_pool: "stripe_expanded_24"
      models: ["gpt-4o", "gpt-5.4"]
      N_values: [4, 8, 16, 32, 64, 128]
      H: 8
      interaction_m: 3
      rounds_by_N:
        N4: 20
        N8: 20
        N16: 24
        N32: 32
        N64: 32
        N128: 32
      summary_seed_counts:
        all_gpt_4o: {N4: 38, N8: 38, N16: 38, N32: 38, N64: 38, N128: 37}
        all_gpt_5_4: {N4: 29, N8: 29, N16: 29, N32: 29, N64: 29, N128: 26}
      mechanism_panel_seed: "seed_0003"
      mechanism_panel_N_values: [4, 16, 64]

  pairwise_alpha:
    figure: "flag_game_pairwise_alpha_main_candidate"
    source_script: "scripts/run_flag_alpha_neutral_corrected.sh"
    plotting_script: "paper/make_flag_game_alpha_visuals.py"
    api:
      temperature: 0.2
      top_p: 1.0
      max_tokens: 200
      image_detail: "high"
      prompt_social_susceptibility: false
      social_susceptibility: 0.5
    design:
      model: "gpt-4o"
      N: 16
      H: 8
      interaction_m: 3
      country_pool: "stripe_expanded_24"
      alpha_values: [0.0, 0.25, 0.5, 0.75, 1.0]
      observation_overlaps: [0.0, 0.3, 0.6, 0.9]
      seeds: "seed_0001..seed_0007"
      plotted_rows: 10
      trials_per_alpha_source: 28

  measured_field_mechanism:
    figure: "flag_game_mechanism1_measured_field_final_france_peru_gpt4o_B50_seed0003"
    source_scripts:
      - "scripts/run_flag_empirical_crop_field_probes.py"
      - "scripts/make_flag_mechanism1_measured_field_final.sh"
    plotting_script: "paper/make_flag_game_mechanism1_measured_field_final.py"
    api:
      model: "gpt-4o"
      temperature: 0.2
      top_p: 1.0
      max_tokens: 200
      image_detail: "high"
      prompt_social_susceptibility: false
    design:
      target_country: "France"
      rival_country: "Peru"
      country_pool: "stripe_expanded_24"
      B: 50
      m: 1
      mechanism_condition: "all_gpt_4o"
      mechanism_seed: "seed_0003"
      empirical_probe_rows: 8650
      unique_crop_keys: 173
      probe_source: "paper/final_charts/results/flag_game/empirical_crop_field_probes/france_gpt4o_B50_crops96/results.csv"

  agent_memory_probe_2:
    figure: "agent_memory_probe_2"
    note: "Archived final figure asset only; no exact generator for this stem was found in the repository search."
